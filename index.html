<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridAds — AI Ad Design Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <main class="app-main">
      <!-- Left Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__brand">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" fill="#6366f1"/>
            <rect x="16" y="2" width="10" height="10" rx="2" fill="#6366f1" opacity="0.6"/>
            <rect x="2" y="16" width="10" height="10" rx="2" fill="#6366f1" opacity="0.6"/>
            <rect x="16" y="16" width="10" height="10" rx="2" fill="#6366f1" opacity="0.3"/>
          </svg>
          <span>GridAds <em>AI</em></span>
        </div>

        <div class="sidebar__scroll">
          <!-- Business Context — single textarea -->
          <section class="panel" id="panel-business">
            <button class="panel__header" data-panel="business">
              <span>📋 Business Context</span>
              <svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="panel__body" data-panel-body="business">
              <textarea class="field-textarea" id="biz-context" rows="6" placeholder="Describe your business, brand colors, tone, audience, product details... The AI will extract what it needs.&#10;&#10;Example: We are &quot;Urban Bistro&quot;, a modern Mexican restaurant. Colors: deep red #8B0000, cream #FFF8DC, gold accents. Tone: warm, inviting. Audience: foodies 25-45."></textarea>
              <button class="btn btn--sm btn--primary" id="btn-save-business">💾 Save</button>
            </div>
          </section>

          <!-- Image Library -->
          <section class="panel" id="panel-images">
            <button class="panel__header" data-panel="images">
              <span>📸 Images</span>
              <svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="panel__body" data-panel-body="images">
              <div class="dropzone" id="image-dropzone">
                <span>Drop images or click to upload</span>
                <input type="file" id="image-input" accept="image/*" multiple hidden>
              </div>
              <div class="image-grid" id="image-grid"></div>
            </div>
          </section>

          <!-- Inspiration Templates — single code area -->
          <section class="panel" id="panel-inspiration">
            <button class="panel__header" data-panel="inspiration">
              <span>✨ Inspiration Code</span>
              <svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="panel__body" data-panel-body="inspiration">
              <textarea class="field-code" id="template-code" rows="8" placeholder="Paste HTML+CSS of ads you like. The AI will adapt them to every format."></textarea>
              <button class="btn btn--sm btn--primary" id="btn-save-template">💾 Save Template</button>
              <div class="template-list" id="template-list"></div>
            </div>
          </section>
        </div>

        <!-- Generate -->
        <div class="sidebar__actions">
          <div class="format-checks">
            <label class="format-check"><input type="checkbox" value="square" checked><span>1:1</span></label>
            <label class="format-check"><input type="checkbox" value="vertical"><span>9:16</span></label>
            <label class="format-check"><input type="checkbox" value="portrait"><span>4:5</span></label>
          </div>
          <button class="btn btn--primary btn--generate" id="btn-generate">
            🔮 Generate Variants
          </button>
        </div>
      </aside>

      <!-- Content Area -->
      <section class="content-area" id="content-area">
        <!-- Loading State (overlays gallery) -->
        <div class="loading-overlay" id="loading-state" hidden>
          <div class="spinner"></div>
          <p>AI is designing...</p>
        </div>

        <!-- Gallery (always visible) -->
        <div class="gallery" id="gallery">
          <div class="gallery__toolbar">
            <span><span id="variant-count">0</span> variants</span>
            <button class="btn btn--ghost btn--sm" id="btn-clear-variants">Clear All</button>
          </div>
          <div class="gallery__grid" id="gallery-grid"></div>
          <!-- Empty hint inside gallery -->
          <div class="gallery__empty" id="gallery-empty">
            <p>Upload images, describe your business, then hit <strong>Generate</strong></p>
          </div>
        </div>

        <!-- Preview Modal -->
        <div class="preview-modal" id="preview-modal" hidden>
          <div class="preview-modal__backdrop" id="preview-backdrop"></div>
          <div class="preview-modal__content">
            <div class="preview-modal__header">
              <span class="preview-modal__title" id="preview-title">Preview</span>
              <div class="preview-modal__actions">
                <button class="btn btn--like" id="btn-preview-like" title="Like">❤️</button>
                <button class="btn btn--dislike" id="btn-preview-dislike" title="Dislike">👎</button>
                <button class="btn btn--ghost btn--sm" id="btn-export-png">📥 Export PNG</button>
                <button class="btn-close" id="btn-close-preview">&times;</button>
              </div>
            </div>
            <div class="preview-modal__body" id="preview-body"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
